      window.supabaseClient = lib.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {

          persistSession: true,

    }
  }
  _initSupabase();
  document.addEventListener('DOMContentLoaded', _initSupabase);
  // Auth forms call this before using the client
  window._initSupabase = _initSupabase;
</script>

function App() {
  const [page, setPage] = useState('dashboard');
  const [history, setHistory] = useState([]);
  const [device, setDevice] = useState('desktop'); // desktop | mobile
  const [splashGone, setSplashGone] = useState(false);
  const [authUser, setAuthUser] = useState(null);   // real Supabase user once signed in
  const [authChecked, setAuthChecked] = useState(false);

  // ── Real auth session management ───────────────────────────
  useEffect(() => {
    const sb = window.supabaseClient;
    if (!sb) { setAuthChecked(true); return; }

    // Check existing session on load
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        setAuthUser(session.user);
        // Keep current page (or default to dashboard)
      } else {
        setPage('auth_login');
      }
      setAuthChecked(true);
    });

    // Listen for future auth changes
    const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
      if (session) {
        setAuthUser(session.user);
        // Navigate to dashboard after sign-in
        if (event === 'SIGNED_IN') setPage('dashboard');
      } else {
        setAuthUser(null);
        if (event === 'SIGNED_OUT') setPage('auth_login');
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  // Expose auth helpers globally so any page can call them
  useEffect(() => {
    window.__authUser = authUser;
    window.__signOut = async () => {
      const sb = window.supabaseClient;
      if (sb) await sb.auth.signOut();
    };
  }, [authUser]);

  useEffect(() => { const t = setTimeout(() => setSplashGone(true), 2000); return () => clearTimeout(t); }, []);

  // Global navigation handle — any button anywhere can call window.__nav('exams') etc.
  // Also scrolls the canvas to top on nav.
  useEffect(() => {
    window.__nav = (id) => {
      if (!id) return;
      setHistory(h => [...h, page]);
      setPage(id);
      // Reset any scroll containers inside the frame on nav
      requestAnimationFrame(() => {
        document.querySelectorAll('[data-app-scroll]').forEach(el => { el.scrollTop = 0; });
      });
    };
    window.__back = () => {
      setHistory(h => {
        if (h.length === 0) return h;
        const prev = h[h.length - 1];
        setPage(prev);
        return h.slice(0, -1);
      });
    };
    return () => { delete window.__nav; delete window.__back; };
  }, [page]);

  // Safety-net delegate: any <button data-nav="page"> inside the frame navigates.
  // Also: any <a data-nav="page">. Lets pages declare destinations without prop drilling.
  useEffect(() => {
    const handler = (e) => {
      const el = e.target.closest('[data-nav]');
      if (!el) return;
      const target = el.getAttribute('data-nav');
      if (!target) return;
      const langCode = el.getAttribute('data-lang');
      if (langCode) window.__langCode = langCode;
      const profileId = el.getAttribute('data-profile');
      if (profileId) window.__profileId = profileId;
      e.preventDefault();
      window.__nav(target);
    };
    document.addEventListener('click', handler);
    return () => document.removeEventListener('click', handler);
  }, []);
  const [vp, setVp] = useState({ w: window.innerWidth, h: window.innerHeight });
  useEffect(() => {
    const r = () => setVp({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', r); return () => window.removeEventListener('resize', r);
  }, []);

  const isMobile = device === 'mobile';
  const W = isMobile ? 390 : 1440;
  const H = isMobile ? 844 : 900;
  const margin = 48 + 100;
  const scale = Math.min(1, (vp.w - 80) / W, (vp.h - margin) / H);

  const renderFrame = () => {
    if (isMobile) {
      return (
        <MobileFrame>
          {MOBILE_PAGES[page]()}
        </MobileFrame>
      );
    }
    const fullBleed = page === 'marketing' || page === 'auth_login' || page === 'auth_signup' || page === 'auth_onboarding' || page === 'otp' || page === 'forgot_pw' || page.startsWith('new_');
    return (
      <div style={{ width:W, height:H, background:'#F9F8F5', borderRadius:14, boxShadow:'0 30px 80px rgba(0,0,0,.16), 0 0 0 1px rgba(0,0,0,.05)', overflow:'hidden', display:'flex' }}>
        {!fullBleed && <WebSidebar active={page === 'lang' ? 'home' : page} onNav={setPage}/>}
        {WEB_PAGES[page]()}
      </div>
    );
  };

  return (
    <div style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-start', background:'#EDEAE3', padding:'40px 40px 120px', overflow:'auto' }}>
      {!splashGone && <Splash/>}
      <div style={{ width:W*scale, height:H*scale, flexShrink:0 }}>
        <div style={{ width:W, height:H, transform:`scale(${scale})`, transformOrigin:'top left' }}>
          {renderFrame()}
        </div>
      </div>

      {/* What's-new strip — sits just above the main toolbar so the day's additions are visible at a glance */}
      <div style={{ position:'fixed', bottom:84, left:'50%', transform:'translateX(-50%)', background:'#1a1a1a', color:'#fff', borderRadius:12, padding:'8px 10px 8px 14px', display:'flex', alignItems:'center', gap:8, zIndex:99, maxWidth:'calc(100vw - 40px)', boxShadow:'0 8px 24px rgba(0,0,0,.25)' }}>
        <span style={{ fontSize:10, fontWeight:700, color:'#FFB58A', textTransform:'uppercase', letterSpacing:'.1em', flexShrink:0, paddingRight:6, borderRight:'1px solid rgba(255,255,255,.15)', marginRight:2 }}>★ New today · 7</span>
        <div style={{ display:'flex', gap:2, overflowX:'auto', scrollbarWidth:'none', maxWidth:'calc(100vw - 200px)' }} className="hide-scroll">
          {PAGES.filter(p => p.isNew).map(p => (
            <button key={p.id} onClick={() => setPage(p.id)} style={{ padding:'6px 11px', fontSize:11, fontWeight: page === p.id ? 700 : 500, color: page === p.id ? '#1a1a1a' : 'rgba(255,255,255,.85)', background: page === p.id ? '#FFB58A' : 'rgba(255,255,255,.06)', borderRadius:7, whiteSpace:'nowrap', flexShrink:0 }}>{p.label.replace('🆕 ','')}</button>
          ))}
        </div>
      </div>

      {/* Toolbar */}
      <div style={{ position:'fixed', bottom:20, left:'50%', transform:'translateX(-50%)', background:'#fff', borderRadius:14, boxShadow:'0 8px 30px rgba(0,0,0,.15), 0 0 0 1px rgba(0,0,0,.06)', padding:6, display:'flex', alignItems:'center', gap:6, zIndex:100, maxWidth:'calc(100vw - 40px)' }}>
        <div style={{ display:'flex', gap:2, paddingRight:8, borderRight:'1px solid #EAEAEA', marginRight:4, overflowX:'auto', scrollbarWidth:'thin', maxWidth:'calc(100vw - 260px)' }}>
          {PAGES.map(p => (
            <button key={p.id} onClick={() => setPage(p.id)} style={{ padding:'8px 14px', fontSize:12, fontWeight: page === p.id ? 700 : 500, color: page === p.id ? '#fff' : (p.isNew ? '#C04A06' : '#333'), background: page === p.id ? '#000' : 'transparent', borderRadius:9, whiteSpace:'nowrap', flexShrink:0 }}>{p.label}</button>
          ))}
        </div>
        <div style={{ display:'flex', gap:2, flexShrink:0, alignItems:'center' }}>
          {[{ id:'desktop', label:'Desktop', size:'1440' }, { id:'mobile', label:'Mobile', size:'390' }].map(d => (
            <button key={d.id} onClick={() => setDevice(d.id)} style={{ padding:'8px 12px', fontSize:11.5, fontWeight: device === d.id ? 700 : 500, color: device === d.id ? '#000' : '#888', background: device === d.id ? '#F4F1EB' : 'transparent', borderRadius:9, display:'flex', flexDirection:'column', alignItems:'center', lineHeight:1.1 }}>
              <span>{d.label}</span>
              <span style={{ fontSize:9, opacity:.6, marginTop:1 }}>{d.size}px</span>
            </button>
          ))}
          {/* Auth status indicator */}
          {authUser ? (
            <div title={authUser.email} style={{ width:30, height:30, borderRadius:15, background:'#C04A06', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:12, fontWeight:700, flexShrink:0, cursor:'pointer' }}
              onClick={async () => { if (window.__signOut) await window.__signOut(); }}>
              {(authUser.email||'?')[0].toUpperCase()}
            </div>
          ) : (
            <button onClick={() => setPage('auth_login')} style={{ padding:'7px 12px', fontSize:11.5, fontWeight:600, color:'#C04A06', background:'#FFF3EE', borderRadius:9, flexShrink:0, whiteSpace:'nowrap' }}>Sign in</button>
          )}
        </div>
      </div>
    </div>
  );
}

let __mounted = false;
const __mount = () => {
  if (__mounted) return;
  if (!window.App || !window.DashboardPage || !window.MDashboard) return;
  __mounted = true;
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
};
const __tick = () => { __mount(); if (!__mounted) setTimeout(__tick, 50); };
__tick();
setTimeout(__mount, 1500);
setTimeout(__mount, 3000);
</script>
</body>
</html>
