<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fluentra — Mobile UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',sans-serif;background:#EDEAE3;color:#111;-webkit-font-smoothing:antialiased;overflow:hidden}
  #root{height:100%}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  button:focus-visible{outline:2px solid #C04A06;outline-offset:2px}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="phone.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function Shell() {
  const [size, setSize] = useState({ w: window.innerWidth, h: window.innerHeight });
  useEffect(() => {
    const onResize = () => setSize({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  const phoneScale = Math.min(1, (size.h - 80) / 780);

  return (
    <div data-screen-label="01 Mobile Dashboard" style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', background:'#EDEAE3', padding:40 }}>
      <PhoneSurface scale={phoneScale}/>
    </div>
  );
}

const waitFor = (fn, cb) => fn() ? cb() : setTimeout(() => waitFor(fn, cb), 30);
waitFor(
  () => window.PhoneSurface && window.LANGUAGES,
  () => ReactDOM.createRoot(document.getElementById('root')).render(<Shell/>)
);
</script>
</body>
</html>
