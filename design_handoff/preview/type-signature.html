<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:24px 28px}
  .eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink4);margin-bottom:8px}
  h1{font-family:var(--serif-display);font-weight:400;font-size:42px;line-height:1.05;color:var(--ink);letter-spacing:-.005em;margin:0}
  .sub{margin-top:8px;font-size:13px;color:var(--ink3);max-width:520px}
</style></head>
<body>
<div class="card">
  <div class="eyebrow">TODAY</div>
  <h1>Speak by summer.</h1>
  <div class="sub">The signature pattern: short uppercase eyebrow, serif headline ending in a period, sans subtitle in ink3.</div>
</div>
</body></html>
