<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:16px 22px;display:flex;align-items:center;gap:18px}
  .ring-wrap{position:relative;width:108px;height:108px}
  .ring-wrap svg{transform:rotate(-90deg)}
  .ring-wrap .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-wrap .num{font-size:24px;font-weight:700;color:#000;font-variant-numeric:tabular-nums;line-height:1}
  .ring-wrap .lab{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
  .bars{flex:1;display:flex;flex-direction:column;gap:14px}
  .bar-row{display:flex;flex-direction:column;gap:4px}
  .bar-meta{display:flex;justify-content:space-between;font-size:11px}
  .bar-meta .l{font-weight:700;color:#000}
  .bar-meta .v{color:#666;font-variant-numeric:tabular-nums}
  .bar{height:4px;border-radius:99px;background:#F2F2F2;overflow:hidden}
  .fill{height:100%;border-radius:99px;transition:width .4s ease}
</style></head>
<body>
<div class="card">
  <div class="ring-wrap">
    <svg width="108" height="108" viewBox="0 0 108 108">
      <circle cx="54" cy="54" r="46" fill="none" stroke="#F2F2F2" stroke-width="8"/>
      <circle cx="54" cy="54" r="46" fill="none" stroke="#C04A06" stroke-width="8" stroke-linecap="round" stroke-dasharray="289" stroke-dashoffset="92"/>
    </svg>
    <div class="center"><div class="num">68</div><div class="lab">DAY GOAL</div></div>
  </div>
  <div class="bars">
    <div class="bar-row">
      <div class="bar-meta"><div class="l">Reading</div><div class="v">42 / 60 min</div></div>
      <div class="bar"><div class="fill" style="width:70%;background:#C04A06"></div></div>
    </div>
    <div class="bar-row">
      <div class="bar-meta"><div class="l">Listening</div><div class="v">28 / 45 min</div></div>
      <div class="bar"><div class="fill" style="width:62%;background:#1A8F4E"></div></div>
    </div>
    <div class="bar-row">
      <div class="bar-meta"><div class="l">Speaking</div><div class="v">12 / 30 min</div></div>
      <div class="bar"><div class="fill" style="width:40%;background:#5B4EFF"></div></div>
    </div>
  </div>
</div>
</body></html>
