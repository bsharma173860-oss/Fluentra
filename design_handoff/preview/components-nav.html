<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .side{width:220px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:8px;display:flex;flex-direction:column;gap:1px}
  .item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--ink2);cursor:pointer;font-weight:500}
  .item:hover{background:var(--bg2)}
  .item.on{background:var(--brand-soft);color:var(--brand);font-weight:600}
  .item .ico{width:16px;height:16px;flex-shrink:0}
  .item .ico svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none}
  .item.on .ico svg{stroke:var(--brand)}
  .item .ct{margin-left:auto;font-size:10px;color:var(--ink4);font-weight:600;font-variant-numeric:tabular-nums}
  .item.on .ct{background:var(--brand);color:#fff;padding:1px 7px;border-radius:99px}
  .sect{font-size:10px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.08em;padding:10px 10px 6px}
  /* bottom tabs */
  .bot{width:300px;background:#fff;border:1px solid var(--border);border-radius:18px;padding:8px;display:flex;justify-content:space-around;box-shadow:var(--shadow-floating)}
  .bot a{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--ink4);font-weight:600;padding:6px 8px;border-radius:10px;text-decoration:none}
  .bot a.on{color:var(--brand)}
  .bot a svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.8;fill:none}
</style></head>
<body>
<div class="card">
  <nav class="side">
    <div class="sect">Learn</div>
    <div class="item on"><span class="ico"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></span>Home</div>
    <div class="item"><span class="ico"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>Library<span class="ct">42</span></div>
    <div class="item"><span class="ico"><svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg></span>Practice</div>
    <div class="item"><span class="ico"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>Progress</div>
    <div class="sect">Account</div>
    <div class="item"><span class="ico"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>Tutor<span class="ct">3</span></div>
    <div class="item"><span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>Settings</div>
  </nav>
  <nav class="bot">
    <a class="on"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home</a>

  </nav>
</div>
</body></html>
