<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:24px;display:flex;align-items:center;justify-content:space-between}
  .pair{display:flex;flex-direction:column;align-items:center;gap:8px}
  .specimen{font-size:48px;color:var(--ink);line-height:1}
  .label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink4)}
  .meta{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--ink4);text-align:center}
</style></head>
<body>
<div class="card">
  <div class="pair">
    <div class="specimen" style="font-family:var(--serif-display);font-weight:400">Aa</div>
    <div class="label">DM Serif Display</div>
    <div class="meta">400 only · editorial headlines</div>
  </div>
  <div class="pair">
    <div class="specimen" style="font-family:'Inter',sans-serif;font-weight:700">Aa</div>
    <div class="label">Inter</div>
    <div class="meta">400 · 500 · 600 · 700</div>
  </div>
  <div class="pair">
    <div class="specimen tabular" style="font-family:'Inter',sans-serif;font-weight:700;font-variant-numeric:tabular-nums">23</div>
    <div class="label">Tabular nums</div>
    <div class="meta">streaks · stats · counts</div>
  </div>
</div>
</body></html>
