<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:24px;display:flex;align-items:center;justify-content:space-around;gap:14px}
  .ex{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:80px;height:60px;border-radius:14px;background:#fff;border:1px solid var(--border)}
  .lab{font-size:11px;font-weight:700;color:var(--ink2)}
  .meta{font-family:ui-monospace,Menlo,monospace;font-size:9.5px;color:var(--ink4);text-align:center;max-width:120px}
</style></head>
<body>
<div class="card">
  <div class="ex">
    <div class="box" style="border:1px solid #EAEAEA"></div>
    <div class="lab">Hairline only</div>
    <div class="meta">cards · default</div>
  </div>
  <div class="ex">
    <div class="box" style="box-shadow:0 1px 0 rgba(0,0,0,.06)"></div>
    <div class="lab">Sticky nav</div>
    <div class="meta">scrolled top bar</div>
  </div>
  <div class="ex">
    <div class="box" style="box-shadow:0 4px 16px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04)"></div>
    <div class="lab">Floating</div>
    <div class="meta">dropdown · popover</div>
  </div>
  <div class="ex">
    <div class="box" style="box-shadow:0 30px 80px rgba(0,0,0,.28), 0 0 0 1px rgba(0,0,0,.04);transform:scale(.9)"></div>
    <div class="lab">Phone frame</div>
    <div class="meta">mockup only</div>
  </div>
</div>
</body></html>
