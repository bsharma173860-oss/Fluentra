<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:20px 24px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
  .step{display:flex;flex-direction:column;align-items:center;gap:8px}
  .shape{background:var(--card);border:1px solid var(--border);width:80px;height:60px}
  .lab{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--ink4)}
  .name{font-size:11px;font-weight:700;color:var(--ink2)}
</style></head>
<body>
<div class="card">
  <div class="step"><div class="shape" style="border-radius:99px;width:60px"></div><div class="name">pill</div><div class="lab">99</div></div>
  <div class="step"><div class="shape" style="border-radius:18px"></div><div class="name">lg</div><div class="lab">18</div></div>
  <div class="step"><div class="shape" style="border-radius:16px"></div><div class="name">md</div><div class="lab">16</div></div>
  <div class="step"><div class="shape" style="border-radius:14px"></div><div class="name">sm</div><div class="lab">14</div></div>
  <div class="step"><div class="shape" style="border-radius:10px"></div><div class="name">xs</div><div class="lab">10</div></div>
  <div class="step"><div class="shape" style="border-radius:9px;width:36px;height:36px"></div><div class="name">tile</div><div class="lab">9</div></div>
</div>
</body></html>
