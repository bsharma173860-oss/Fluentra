<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:18px 20px;display:flex;gap:10px}
  .col{flex:1;display:flex;flex-direction:column;gap:6px}
  .row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 10px}
  .dot{width:28px;height:28px;border-radius:7px;flex-shrink:0;border:1px solid rgba(0,0,0,.06)}
  .label{font-size:11px;font-weight:700;color:var(--ink2)}
  .hex{font-size:10px;color:var(--ink4);font-family:ui-monospace,Menlo,monospace;margin-left:auto;text-transform:uppercase}
</style></head>
<body>
<div class="card">
  <div class="col">
    <div class="row"><div class="dot" style="background:#000"></div><div class="label">ink</div><div class="hex">#000000</div></div>
    <div class="row"><div class="dot" style="background:#333"></div><div class="label">ink2</div><div class="hex">#333333</div></div>
    <div class="row"><div class="dot" style="background:#666"></div><div class="label">ink3</div><div class="hex">#666666</div></div>
  </div>
  <div class="col">
    <div class="row"><div class="dot" style="background:#999"></div><div class="label">ink4</div><div class="hex">#999999</div></div>
    <div class="row"><div class="dot" style="background:#BBB"></div><div class="label">ink5</div><div class="hex">#BBBBBB</div></div>
    <div class="row" style="background:var(--bg2)"><span style="font-size:10px;color:var(--ink3);line-height:1.4">Pure neutral —<br>no blue tint.</span></div>
  </div>
</div>
</body></html>
