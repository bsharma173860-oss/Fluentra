<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .tabs{display:flex;gap:0;border-bottom:1px solid var(--border)}
  .tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--ink3);border-bottom:2px solid transparent;cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:-1px}
  .tab.on{color:var(--brand);border-bottom-color:var(--brand)}
  .tab .ct{background:var(--bg2);color:var(--ink3);font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;font-variant-numeric:tabular-nums}
  .tab.on .ct{background:var(--brand-soft);color:var(--brand)}
  .pill{display:inline-flex;background:var(--bg2);border-radius:99px;padding:3px;gap:2px}
  .pill button{border:0;background:transparent;font-family:inherit;font-size:12px;font-weight:600;padding:6px 14px;border-radius:99px;color:var(--ink3);cursor:pointer}
  .pill button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
</style></head>
<body>
<div class="card" style="flex-direction:column;align-items:stretch;gap:24px">
  <div class="tabs">
    <div class="tab on">Overview</div>
    <div class="tab">Vocabulary <span class="ct">142</span></div>
    <div class="tab">Grammar <span class="ct">28</span></div>
    <div class="tab">Sessions <span class="ct">9</span></div>
    <div class="tab">Notes</div>
  </div>
  <div class="pill">
    <button class="on">Speaking</button>
    <button>Listening</button>
    <button>Reading</button>
    <button>Writing</button>
  </div>
</div>
</body></html>
