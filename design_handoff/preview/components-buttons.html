<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:22px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .btn{font-family:var(--sans);font-size:13px;font-weight:700;border-radius:99px;padding:9px 16px;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:6px;line-height:1}
  .primary{background:#C04A06;color:#fff}
  .soft{background:#FFF0EE;color:#C04A06}
  .outline{background:transparent;color:#000;border:1.5px solid #EAEAEA}
  .ghost{background:transparent;color:#333}
  .lg{font-size:14.5px;padding:11px 20px}
  .sm{font-size:12px;padding:7px 12px}
</style></head>
<body>
<div class="card">
  <button class="btn primary lg">Start free</button>
  <button class="btn primary">Continue</button>
  <button class="btn soft">Save for later</button>
  <button class="btn outline">See pricing</button>
  <button class="btn ghost sm">Skip</button>
</div>
</body></html>
