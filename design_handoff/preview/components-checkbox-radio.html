<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .opt{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink2);cursor:pointer}
  .box{width:18px;height:18px;border:1.5px solid var(--ink5);border-radius:5px;display:flex;align-items:center;justify-content:center;background:#fff;flex-shrink:0}
  .box.on{background:var(--brand);border-color:var(--brand)}
  .box.on svg{stroke:#fff;stroke-width:3;fill:none;width:11px;height:11px}
  .box.indet{background:var(--brand);border-color:var(--brand)}
  .box.indet::after{content:"";width:9px;height:2px;background:#fff;border-radius:1px}
  .radio{width:18px;height:18px;border:1.5px solid var(--ink5);border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .radio.on{border-color:var(--brand);border-width:1.5px}
  .radio.on::after{content:"";width:9px;height:9px;background:var(--brand);border-radius:50%}
  .group{display:flex;flex-direction:column;gap:9px;min-width:140px}
  .grouplabel{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
</style></head>
<body>
<div class="card">
  <div class="group">
    <span class="grouplabel">Skills</span>
    <label class="opt"><span class="box on"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>Speaking</label>
    <label class="opt"><span class="box on"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>Listening</label>
    <label class="opt"><span class="box indet"></span>Reading <span style="color:var(--ink4);font-size:11px">(some)</span></label>
    <label class="opt"><span class="box"></span>Writing</label>
  </div>
  <div class="group">
    <span class="grouplabel">Level</span>
    <label class="opt"><span class="radio"></span>Beginner (A1)</label>
    <label class="opt"><span class="radio on"></span>Intermediate (B1)</label>
    <label class="opt"><span class="radio"></span>Advanced (C1)</label>
    <label class="opt"><span class="radio"></span>Native</label>
  </div>
</div>
</body></html>
