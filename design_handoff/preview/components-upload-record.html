<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .drop{flex:1;min-width:240px;border:1.5px dashed var(--ink5);border-radius:14px;padding:22px;text-align:center;background:#fff}
  .drop.active{border-color:var(--brand);background:var(--brand-soft)}
  .drop svg{width:24px;height:24px;stroke:var(--ink3);stroke-width:1.8;fill:none;margin-bottom:8px}
  .drop.active svg{stroke:var(--brand)}
  .drop .t{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px}
  .drop .s{font-size:11px;color:var(--ink4)}
  .drop a{color:var(--brand);text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:2px}
  /* recorder */
  .rec{flex:1;min-width:240px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px}
  .mic{width:46px;height:46px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
  .mic.live{box-shadow:0 0 0 0 rgba(192,74,6,.4);animation:pulse 1.5s infinite}
  @keyframes pulse{50%{box-shadow:0 0 0 10px rgba(192,74,6,0)}}
  .mic svg{width:18px;height:18px;stroke:#fff;stroke-width:2;fill:none}
  .wave{flex:1;display:flex;align-items:center;gap:2px;height:34px}
  .wave span{flex:1;background:var(--brand);border-radius:2px;opacity:.85}
  .time{font-variant-numeric:tabular-nums;font-size:12px;color:var(--ink3);font-weight:600}
</style></head>
<body>
<div class="card">
  <div class="drop">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <div class="t">Drop your essay here</div>
    <div class="s">or <a>browse</a> · pdf, docx, txt up to 5MB</div>
  </div>
  <div class="drop active">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    <div class="t">essay-paris.pdf</div>
    <div class="s">142 KB · ready to grade</div>
  </div>
  <div class="rec">
    <div class="mic live"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></div>
    <div class="wave">
      <span style="height:30%"></span><span style="height:55%"></span><span style="height:80%"></span><span style="height:45%"></span><span style="height:70%"></span><span style="height:90%"></span><span style="height:60%"></span><span style="height:35%"></span><span style="height:75%"></span><span style="height:50%"></span><span style="height:85%"></span><span style="height:40%"></span><span style="height:65%"></span><span style="height:25%"></span>
    </div>
    <div class="time">0:14</div>
  </div>
</div>
</body></html>
