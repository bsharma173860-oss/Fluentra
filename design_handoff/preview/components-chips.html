<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:22px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .chip{font-size:11px;font-weight:700;letter-spacing:.04em;padding:4px 10px;border-radius:99px;display:inline-flex;align-items:center;gap:5px;line-height:1.4}
  .chip svg{width:12px;height:12px;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
</style></head>
<body>
<div class="card">
  <span class="chip" style="background:#FFE5DE;color:#C04A06">DELE B2</span>
  <span class="chip" style="background:#EEEDFF;color:#5B4EFF">SPEAKING</span>
  <span class="chip" style="background:#E2F5E9;color:#1A8F4E">LISTENING</span>
  <span class="chip" style="background:#FFEAC2;color:#A65A00">WRITING</span>
  <span class="chip" style="background:#F4F1EB;color:#333">A2 → B1</span>
  <span class="chip" style="background:#000;color:#fff"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M12 2c-1 7-5 8-7 9 4 1 6 4 7 11 1-7 3-10 7-11-2-1-6-2-7-9z"/></svg>PRO</span>
  <span class="chip" style="background:#FFF0EE;color:#C04A06"><svg viewBox="0 0 24 24" stroke="currentColor"><path d="M12 3s5 4 5 9a5 5 0 0 1-10 0c0-3 2-4 2-7 2 1 3 3 3 5 1-1 0-3 0-7z"/></svg>23</span>
  <span class="chip" style="background:#fff;color:#666;border:1px solid #EAEAEA">FREE</span>
</div>
</body></html>
