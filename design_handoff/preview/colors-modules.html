<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:18px 20px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .mod{border-radius:var(--r-sm);border:1px solid var(--border);background:var(--card);padding:12px;display:flex;flex-direction:column;gap:8px}
  .tile{width:36px;height:36px;border-radius:9px;display:grid;place-items:center}
  .tile svg{width:18px;height:18px;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
  .name{font-size:12px;font-weight:700;color:var(--ink2)}
  .hex{font-size:10px;color:var(--ink4);font-family:ui-monospace,Menlo,monospace;text-transform:uppercase}
</style></head>
<body>
<div class="card">
  <div class="mod">
    <div class="tile" style="background:#EEEDFF;color:#5B4EFF"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></div>
    <div class="name">Speaking</div><div class="hex">#5B4EFF · #EEEDFF</div>
  </div>
  <div class="mod">
    <div class="tile" style="background:#FFEAC2;color:#A65A00"><svg viewBox="0 0 24 24"><path d="M3 21l4-1 12-12-3-3L4 17l-1 4z"/></svg></div>
    <div class="name">Writing</div><div class="hex">#A65A00 · #FFEAC2</div>
  </div>
  <div class="mod">
    <div class="tile" style="background:#E2F5E9;color:#1A8F4E"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 18 0v3a2 2 0 0 1-2 2h-1v-6h3M3 12v3a2 2 0 0 0 2 2h1v-6H3"/></svg></div>
    <div class="name">Listening</div><div class="hex">#1A8F4E · #E2F5E9</div>
  </div>
  <div class="mod">
    <div class="tile" style="background:#FFE5DE;color:#C04A06"><svg viewBox="0 0 24 24"><path d="M4 5a2 2 0 0 1 2-2h6v18H6a2 2 0 0 1-2-2zM20 5a2 2 0 0 0-2-2h-6v18h6a2 2 0 0 0 2-2z"/></svg></div>
    <div class="name">Reading</div><div class="hex">#C04A06 · #FFE5DE</div>
  </div>
</div>
</body></html>
