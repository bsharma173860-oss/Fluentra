<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body{background:rgba(0,0,0,.45)}
  .modal{background:#fff;border-radius:18px;padding:24px;width:380px;box-shadow:0 30px 80px rgba(0,0,0,.28);margin:18px auto}
  .modal h2{font-family:var(--serif-display);font-weight:400;font-size:22px;color:var(--ink);margin:0 0 6px;line-height:1.15}
  .modal p{font-size:13px;color:var(--ink3);line-height:1.5}
  .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
  .btn{font-family:var(--sans);font-size:13px;font-weight:700;border-radius:99px;padding:9px 16px;border:0;cursor:pointer}
  .ghost{background:transparent;color:var(--ink3)}
  .primary{background:var(--brand);color:#fff}
  .danger{background:#C0392B;color:#fff}
  .sheet{background:#fff;border-radius:18px 18px 0 0;padding:18px 22px 22px;width:340px;box-shadow:0 -10px 40px rgba(0,0,0,.2);margin:18px auto 0}
  .grab{width:36px;height:4px;background:var(--ink5);border-radius:2px;margin:0 auto 14px}
  .sheet h3{font-family:var(--serif-display);font-weight:400;font-size:18px;color:var(--ink);margin:0 0 4px}
  .sheet ul{list-style:none;padding:0;margin:14px 0 0}
  .sheet li{padding:11px 0;border-top:1px solid var(--hairline);font-size:13px;display:flex;justify-content:space-between;align-items:center;color:var(--ink2)}
  .sheet li:first-child{border-top:0}
  .sheet li.danger{color:#C0392B}
  .sheet li svg{width:14px;height:14px;stroke:var(--ink4);stroke-width:2;fill:none}
</style></head>
<body>
<div class="card" style="align-items:flex-start;background:rgba(0,0,0,.45);padding:0">
  <div class="modal">
    <h2>Reset your streak?</h2>
    <p>You've been on fire for 23 days. Resetting clears your XP multiplier and the streak count returns to zero.</p>
    <div class="actions"><button class="btn ghost">Cancel</button><button class="btn danger">Reset streak</button></div>
  </div>
  <div class="sheet">
    <div class="grab"></div>
    <h3>More actions</h3>
    <p style="font-size:12px;color:var(--ink4)">Lesson 4 · Ordering coffee</p>
    <ul>
      <li>Save to library<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></li>
      <li>Share with a friend<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></li>
      <li>Mark as reviewed<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></li>
      <li class="danger">Remove from history</li>
    </ul>
  </div>
</div>
</body></html>
