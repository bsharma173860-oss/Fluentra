<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .row{align-items:flex-start}
  .item{display:flex;flex-direction:column;gap:6px;min-width:170px}
  .name{font-size:13px;color:var(--ink);font-weight:500}
  .desc{font-size:11px;color:var(--ink4)}
  .switch{width:40px;height:24px;border-radius:99px;background:var(--ink5);position:relative;cursor:pointer;transition:background .2s}
  .switch.on{background:var(--brand)}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:left .2s}
  .switch.on::after{left:18px}
  .seg{display:inline-flex;background:var(--bg2);border-radius:99px;padding:3px;gap:2px}
  .seg button{border:0;background:transparent;font-family:inherit;font-size:12px;font-weight:600;padding:6px 14px;border-radius:99px;color:var(--ink3);cursor:pointer}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
</style></head>
<body>
<div class="card">
  <div class="item">
    <div class="row" style="gap:10px;align-items:center"><span class="switch on"></span><span class="name">Daily reminders</span></div>
    <span class="desc">8:00pm in Europe/Madrid</span>
  </div>
  <div class="item">
    <div class="row" style="gap:10px;align-items:center"><span class="switch"></span><span class="name">Weekly digest</span></div>
    <span class="desc">Off</span>
  </div>
  <div class="item">
    <div class="row" style="gap:10px;align-items:center"><span class="switch on"></span><span class="name">Sound effects</span></div>
    <span class="desc">On</span>
  </div>
  <div class="item">
    <span class="label" style="margin-bottom:0">View</span>
    <div class="seg"><button>Day</button><button class="on">Week</button><button>Month</button></div>
  </div>
</div>
</body></html>
