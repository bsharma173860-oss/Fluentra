<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:18px 20px;display:flex;gap:14px}
  .swatch{flex:1;border-radius:var(--r-sm);border:1px solid var(--border);overflow:hidden;background:var(--card);display:flex;flex-direction:column}
  .chip{height:64px}
  .meta{padding:8px 10px}
  .name{font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:.02em}
  .hex{font-size:10px;color:var(--ink4);font-family:ui-monospace,Menlo,monospace;margin-top:2px;text-transform:uppercase}
</style></head>
<body>
<div class="card">
  <div class="swatch"><div class="chip" style="background:#F9F8F5"></div><div class="meta"><div class="name">bg</div><div class="hex">#F9F8F5</div></div></div>
  <div class="swatch"><div class="chip" style="background:#F4F1EB"></div><div class="meta"><div class="name">bg2</div><div class="hex">#F4F1EB</div></div></div>
  <div class="swatch"><div class="chip" style="background:#EDEAE3"></div><div class="meta"><div class="name">bg3</div><div class="hex">#EDEAE3</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">card</div><div class="hex">#FFFFFF</div></div></div>
  <div class="swatch"><div class="chip" style="background:#FFFEFA"></div><div class="meta"><div class="name">paper</div><div class="hex">#FFFEFA</div></div></div>
</div>
</body></html>
