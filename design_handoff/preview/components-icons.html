<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:14px 22px;display:flex;align-items:center;gap:18px;justify-content:space-between}
  .grid{display:grid;grid-template-columns:repeat(7,32px);grid-template-rows:repeat(2,32px);gap:6px;align-items:center}
  .ic{width:32px;height:32px;border-radius:8px;background:#fff;border:1px solid var(--border);display:grid;place-items:center;color:#333}
  .ic svg{width:16px;height:16px;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;stroke:currentColor}
  .meta{font-size:11px;color:var(--ink4);font-family:ui-monospace,Menlo,monospace;line-height:1.5}
  .meta b{color:var(--ink2);font-family:var(--sans);font-weight:700;display:block;margin-bottom:2px}
</style></head>
<body>
<div class="card">
  <div class="grid">
    <div class="ic" title="home"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8v9a2 2 0 0 1-2 2h-4v-7h-6v7H5a2 2 0 0 1-2-2z"/></svg></div>
    <div class="ic" title="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5"/></svg></div>
    <div class="ic" title="bell"><svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9zM10 21a2 2 0 0 0 4 0"/></svg></div>
    <div class="ic" title="cog"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.6 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.6-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg></div>
    <div class="ic" title="play"><svg viewBox="0 0 24 24"><path d="M6 4l14 8-14 8z"/></svg></div>
    <div class="ic" title="check"><svg viewBox="0 0 24 24"><path d="M5 12l5 5 9-11"/></svg></div>
    <div class="ic" title="plus"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div>

    <div class="ic" title="flame" style="color:#C04A06"><svg viewBox="0 0 24 24"><path d="M12 3s5 4 5 9a5 5 0 0 1-10 0c0-3 2-4 2-7 2 1 3 3 3 5 1-1 0-3 0-7z"/></svg></div>
    <div class="ic" title="spark"><svg viewBox="0 0 24 24"><path d="M12 2c-1 7-5 8-7 9 4 1 6 4 7 11 1-7 3-10 7-11-2-1-6-2-7-9z"/></svg></div>
    <div class="ic" title="trophy"><svg viewBox="0 0 24 24"><path d="M7 4h10v4a5 5 0 0 1-10 0zM5 4h2v3a3 3 0 0 1-2 0zM17 4h2v3a3 3 0 0 1-2 0zM10 14h4l-1 5h-2z"/></svg></div>
    <div class="ic" title="bookmark"><svg viewBox="0 0 24 24"><path d="M6 3h12v18l-6-4-6 4z"/></svg></div>
    <div class="ic" title="star"><svg viewBox="0 0 24 24"><path d="M12 3l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/></svg></div>
    <div class="ic" title="globe"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a13 13 0 0 1 0 18 13 13 0 0 1 0-18z"/></svg></div>
    <div class="ic" title="user"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></div>
  </div>
  <div class="meta"><b>24×24 · 2px</b>round caps · fill:none<br>currentColor · default 14×14</div>
</div>
</body></html>
