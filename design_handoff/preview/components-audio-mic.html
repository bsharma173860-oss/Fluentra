<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .player{flex:1;min-width:340px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px}
  .meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
  .ttl{font-size:13px;color:var(--ink);font-weight:600;margin-bottom:2px}
  .sub{font-size:11px;color:var(--ink4)}
  .speed{font-size:11px;font-weight:700;background:var(--bg2);padding:4px 8px;border-radius:99px;color:var(--ink2)}
  .wave{display:flex;align-items:center;gap:2px;height:42px;margin-bottom:10px}
  .wave span{flex:1;border-radius:2px;background:var(--ink5)}
  .wave span.played{background:var(--brand)}
  .ctrl{display:flex;align-items:center;gap:14px}
  .ctrl .time{font-size:11px;color:var(--ink4);font-variant-numeric:tabular-nums;min-width:36px}
  .play{width:38px;height:38px;background:var(--brand);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .play svg{width:14px;height:14px;fill:#fff}
  .icb{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink3);cursor:pointer}
  .icb svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}
  /* mic states */
  .mic{flex:1;min-width:200px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
  .ring{width:72px;height:72px;border-radius:50%;background:var(--brand);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;position:relative}
  .ring svg{width:26px;height:26px;stroke:#fff;stroke-width:2;fill:none}
  .ring.live{box-shadow:0 0 0 0 rgba(192,74,6,.45);animation:p 1.4s infinite}
  @keyframes p{50%{box-shadow:0 0 0 18px rgba(192,74,6,0)}}
  .ring.idle{background:var(--bg2)}
  .ring.idle svg{stroke:var(--ink3)}
  .ring.done{background:#1A8F4E}
  .mic-l{font-size:12px;font-weight:700;color:var(--ink);margin-top:4px}
  .mic-s{font-size:10px;color:var(--ink4);margin-top:2px}
</style></head>
<body>
<div class="card" style="align-items:stretch">
  <div class="player">
    <div class="meta"><div><div class="ttl">Madrid news clip · El Pais</div><div class="sub">Native pace · 2:14 min</div></div><span class="speed">1.0×</span></div>
    <div class="wave">
      <span class="played" style="height:30%"></span><span class="played" style="height:55%"></span><span class="played" style="height:75%"></span><span class="played" style="height:40%"></span><span class="played" style="height:80%"></span><span class="played" style="height:95%"></span><span class="played" style="height:60%"></span>
      <span style="height:50%"></span><span style="height:35%"></span><span style="height:70%"></span><span style="height:55%"></span><span style="height:85%"></span><span style="height:40%"></span><span style="height:65%"></span><span style="height:30%"></span><span style="height:75%"></span><span style="height:50%"></span><span style="height:90%"></span>
    </div>
    <div class="ctrl">
      <span class="time">0:48</span>
      <span class="icb"><svg viewBox="0 0 24 24"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg></span>
      <span class="play"><svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20" stroke="none"/></svg></span>
      <span class="icb"><svg viewBox="0 0 24 24"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg></span>
      <span class="time" style="text-align:right">2:14</span>
    </div>
  </div>
  <div class="mic">
    <div class="ring idle"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></div>
    <div class="mic-l">Tap to speak</div>
    <div class="mic-s">Querría un café…</div>
  </div>
  <div class="mic">
    <div class="ring live"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></div>
    <div class="mic-l" style="color:var(--brand)">Listening… 0:04</div>
    <div class="mic-s">Speak naturally</div>
  </div>
  <div class="mic">
    <div class="ring done"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div class="mic-l" style="color:#1A8F4E">Got it!</div>
    <div class="mic-s">Pronunciation: 92%</div>
  </div>
</div>
</body></html>
