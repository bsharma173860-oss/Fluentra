<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .anchor{position:relative;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#fff;border:1px solid var(--border);border-radius:99px;font-size:12px;color:var(--ink2);font-weight:600}
  .tip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:11px;font-weight:500;padding:6px 10px;border-radius:7px;white-space:nowrap;line-height:1.3}
  .tip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--ink)}
  .pop{position:absolute;top:calc(100% + 8px);left:0;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;width:240px;box-shadow:var(--shadow-floating);font-size:12.5px;color:var(--ink2);line-height:1.45}
  .pop b{color:var(--ink);font-size:12.5px}
  .pop a{color:var(--brand);font-weight:600;font-size:11px}
  .word{border-bottom:1.5px dotted var(--brand);cursor:help}
  .sentence{font-size:15px;color:var(--ink);line-height:1.7}
</style></head>
<body>
<div class="card" style="flex-direction:column;align-items:flex-start;gap:40px">
  <div class="anchor">
    <span style="width:6px;height:6px;background:#1A8F4E;border-radius:50%"></span>23-day streak
    <div class="tip">8 hours left to keep it alive</div>
  </div>
  <div style="position:relative;max-width:520px">
    <p class="sentence">Querría un café <span class="word">cortado</span>, por favor.</p>
    <div class="pop" style="left:182px;top:34px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px"><b>cortado</b><span style="font-size:10px;color:var(--ink4)">noun · m.</span></div>
      <div style="margin-bottom:6px">an espresso "cut" with a small amount of warm milk.</div>
      <a>Add to vocab →</a>
    </div>
  </div>
</div>
</body></html>
