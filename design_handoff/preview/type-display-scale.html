<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:18px 24px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--hairline);padding-bottom:8px}
  .row:last-child{border:0}
  .specimen{flex:1;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .meta{font-size:10px;color:var(--ink4);font-family:ui-monospace,Menlo,monospace;flex-shrink:0;text-align:right;min-width:140px}
</style></head>
<body>
<div class="card">
  <div class="row"><div class="specimen" style="font-family:var(--serif-display);font-size:42px;line-height:1.05">Speak by summer.</div><div class="meta">Hero · 42–62 / 400</div></div>
  <div class="row"><div class="specimen" style="font-family:var(--serif-display);font-size:30px">Pick up where you left off</div><div class="meta">Page · 30–34 / 400</div></div>
  <div class="row"><div class="specimen" style="font-family:var(--serif-display);font-size:22px">Today's session</div><div class="meta">Section 1 · 22 / 400</div></div>
  <div class="row"><div class="specimen" style="font-size:17px;font-weight:700">Recent activity</div><div class="meta">Section 2 · 17 / 700</div></div>
</div>
</body></html>
