<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:20px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .step{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{background:#FFE5DE;border:1px dashed #C04A06}
  .lab{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--ink4)}
</style></head>
<body>
<div class="card">
  <div class="step"><div class="box" style="width:4px;height:4px"></div><div class="lab">4</div></div>
  <div class="step"><div class="box" style="width:8px;height:8px"></div><div class="lab">8</div></div>
  <div class="step"><div class="box" style="width:12px;height:12px"></div><div class="lab">12</div></div>
  <div class="step"><div class="box" style="width:16px;height:16px"></div><div class="lab">16</div></div>
  <div class="step"><div class="box" style="width:20px;height:20px"></div><div class="lab">20</div></div>
  <div class="step"><div class="box" style="width:24px;height:24px"></div><div class="lab">24</div></div>
  <div class="step"><div class="box" style="width:28px;height:28px"></div><div class="lab">28</div></div>
  <div class="step"><div class="box" style="width:32px;height:32px"></div><div class="lab">32</div></div>
  <div class="step"><div class="box" style="width:36px;height:36px"></div><div class="lab">36</div></div>
  <div class="step"><div class="box" style="width:40px;height:40px"></div><div class="lab">40</div></div>
  <div class="step"><div class="box" style="width:48px;height:48px"></div><div class="lab">48</div></div>
</div>
</body></html>
