<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:16px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .input{flex:1;min-width:200px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--ink2);font-family:inherit}
  .input:focus{outline:2px solid var(--brand);outline-offset:2px;border-color:var(--brand)}
  .field{flex:1;min-width:200px}
  .label{font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.06em}
  .search{flex:2;display:flex;align-items:center;gap:8px;background:#F4F1EB;border-radius:99px;padding:8px 14px;font-size:13px;color:var(--ink3)}
  .search svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
</style></head>
<body>
<div class="card">
  <div class="field">
    <label class="label">Email</label>
    <input class="input" placeholder="maria@example.com">
  </div>
  <div class="field">
    <label class="label">Daily goal</label>
    <input class="input" value="20 minutes" style="border-color:var(--brand);outline:2px solid var(--brand);outline-offset:0">
  </div>
  <div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5"/></svg>Search lessons, words, exams…</div>
</div>
</body></html>
