<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--sans)}
  .card{padding:18px 20px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .lang{border-radius:var(--r-sm);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;height:120px}
  .top{flex:1;display:grid;place-items:center;font-size:28px}
  .meta{padding:8px 10px;display:flex;align-items:center;justify-content:space-between;background:#fff;border-top:1px solid var(--border)}
  .name{font-size:11px;font-weight:700;color:var(--ink2)}
  .accent{width:10px;height:10px;border-radius:50%}
  .hex{font-size:9px;color:var(--ink4);font-family:ui-monospace,Menlo,monospace;text-transform:uppercase;margin-top:2px}
</style></head>
<body>
<div class="card">
  <div class="lang"><div class="top" style="background:#FFF0EE">🇪🇸</div><div class="meta"><div><div class="name">es · Spanish</div><div class="hex">#C04A06</div></div><div class="accent" style="background:#C04A06"></div></div></div>
  <div class="lang"><div class="top" style="background:#FFF0F5">🇯🇵</div><div class="meta"><div><div class="name">ja · Japanese</div><div class="hex">#C84070</div></div><div class="accent" style="background:#C84070"></div></div></div>
  <div class="lang"><div class="top" style="background:#EEF4FF">🇫🇷</div><div class="meta"><div><div class="name">fr · French</div><div class="hex">#1558B0</div></div><div class="accent" style="background:#1558B0"></div></div></div>
  <div class="lang"><div class="top" style="background:#FFF7E8">🇩🇪</div><div class="meta"><div><div class="name">de · German</div><div class="hex">#A65A00</div></div><div class="accent" style="background:#A65A00"></div></div></div>
  <div class="lang"><div class="top" style="background:#EEEDFF">🇬🇧</div><div class="meta"><div><div class="name">en · English</div><div class="hex">#5B4EFF</div></div><div class="accent" style="background:#5B4EFF"></div></div></div>
</div>
</body></html>
